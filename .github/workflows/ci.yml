name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  DATABASE_URL: postgresql://cardmatch:cardmatch@localhost:5432/cardmatch
  SESSION_SECRET: test-session-secret-at-least-32-chars-long
  REALTIME_BUS: memory

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cardmatch
          POSTGRES_PASSWORD: cardmatch
          POSTGRES_DB: cardmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cardmatch -d cardmatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  e2e:
    needs: lint-and-unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cardmatch
          POSTGRES_PASSWORD: cardmatch
          POSTGRES_DB: cardmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cardmatch -d cardmatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_PORT: "3001"
